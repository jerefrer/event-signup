{{define "email_content"}}
<p style="margin:0 0 1em;color:#000000;line-height:24px;">{{.Greeting}}</p>
<p style="margin:0 0 1em;color:#000000;line-height:24px;">{{.Intro}}</p>
<p style="font-size:22px;font-weight:bold;text-align:center;color:#c0392b;margin:24px 0;line-height:1.3;">{{.ReceiverName}}</p>
<p style="margin:0 0 0.75em;color:#000000;line-height:24px;">{{.WishesIntro}}</p>
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:0 0 16px;">
    <tr><td style="padding:8px 0;border-bottom:1px solid #eeeeee;color:#000000;line-height:22px;"><strong>{{.WishBuyLabel}}</strong> {{.WishBuy}}</td></tr>
    <tr><td style="padding:8px 0;border-bottom:1px solid #eeeeee;color:#000000;line-height:22px;"><strong>{{.WishMakeLabel}}</strong> {{.WishMake}}</td></tr>
    <tr><td style="padding:8px 0;color:#000000;line-height:22px;"><strong>{{.WishFreeLabel}}</strong> {{.WishFree}}</td></tr>
</table>
{{end}}
{{template "email_layout" .}}
