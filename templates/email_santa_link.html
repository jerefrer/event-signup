{{define "email_content"}}
<p style="margin:0 0 1em;color:#000000;line-height:24px;">{{.Greeting}}</p>
<p style="margin:0 0 1em;color:#000000;line-height:24px;">{{.Intro}}</p>
<div style="text-align:center;margin:24px 0;">
    <a href="{{.EditURL}}" style="display:inline-block;background-color:#c0392b;color:#ffffff;padding:12px 24px;text-decoration:none;border-radius:4px;font-weight:500;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">{{.ButtonText}}</a>
</div>
<p style="font-style:italic;color:#5f5f5f;font-size:14px;padding:12px 16px;background-color:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;margin:24px 0 0;line-height:21px;">{{.Disclaimer}}</p>
<p style="color:#888888;font-size:13px;line-height:20px;margin:24px 0 0;">{{.EventTitle}}</p>
{{end}}
{{template "email_layout" .}}
